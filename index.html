<!DOCTYPE html>
<html >
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: #f0f0f0;
            font-family: Arial, sans-serif;
        }

        .reloj {
            position: relative;
            width: 300px;
            height: 300px;
            border: 10px solid #333;
            border-radius: 50%;
            background: white;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }

        .hora {
            position: absolute;
            width: 100%;
            height: 100%;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            color: #333;
        }

        .hora1 { transform: rotate(30deg); }
        .hora1 span { transform: rotate(-30deg); position: absolute; top: 10px; left: 50%; transform-origin: center; }

        .hora2 { transform: rotate(60deg); }
        .hora2 span { transform: rotate(-60deg); position: absolute; top: 10px; left: 50%; }

        .hora3 { transform: rotate(90deg); }
        .hora3 span { transform: rotate(-90deg); position: absolute; top: 10px; left: 50%; }

        .hora4 { transform: rotate(120deg); }
        .hora4 span { transform: rotate(-120deg); position: absolute; top: 10px; left: 50%; }

        .hora5 { transform: rotate(150deg); }
        .hora5 span { transform: rotate(-150deg); position: absolute; top: 10px; left: 50%; }

        .hora6 { transform: rotate(180deg); }
        .hora6 span { transform: rotate(-180deg); position: absolute; top: 10px; left: 50%; }

        .hora7 { transform: rotate(210deg); }
        .hora7 span { transform: rotate(-210deg); position: absolute; top: 10px; left: 50%; }

        .hora8 { transform: rotate(240deg); }
        .hora8 span { transform: rotate(-240deg); position: absolute; top: 10px; left: 50%; }

        .hora9 { transform: rotate(270deg); }
        .hora9 span { transform: rotate(-270deg); position: absolute; top: 10px; left: 50%; }

        .hora10 { transform: rotate(300deg); }
        .hora10 span { transform: rotate(-300deg); position: absolute; top: 10px; left: 50%; }

        .hora11 { transform: rotate(330deg); }
        .hora11 span { transform: rotate(-330deg); position: absolute; top: 10px; left: 50%; }

        .hora12 { transform: rotate(0deg); }
        .hora12 span { transform: rotate(0deg); position: absolute; top: 10px; left: 50%; }

        .manecilla {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: bottom;
            border-radius: 5px;
        }

        .horah {
            width: 6px;
            height: 80px;
            background: #333;
            transform: translateX(-50%);
            animation: horas 12s infinite linear;
        }

        .minuto {
            width: 4px;
            height: 110px;
            background: #666;
            transform: translateX(-50%);
            animation: minutos 60s infinite linear;
        }

        .segundo {
            width: 2px;
            height: 120px;
            background: #f00;
            transform: translateX(-50%);
            animation: segundos 10s infinite linear;
        }

        .centro {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 12px;
            height: 12px;
            background: #333;
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }

        @keyframes segundos {
            from { transform: translateX(-50%) rotate(0deg); }
            to { transform: translateX(-50%) rotate(360deg); }
        }

        @keyframes minutos {
            from { transform: translateX(-50%) rotate(0deg); }
            to { transform: translateX(-50%) rotate(360deg); }
        }

        @keyframes horas {
            from { transform: translateX(-50%) rotate(0deg); }
            to { transform: translateX(-50%) rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="reloj">
        <div class="hora hora1"><span>1</span></div>
        <div class="hora hora2"><span>2</span></div>
        <div class="hora hora3"><span>3</span></div>
        <div class="hora hora4"><span>4</span></div>
        <div class="hora hora5"><span>5</span></div>
        <div class="hora hora6"><span>6</span></div>
        <div class="hora hora7"><span>7</span></div>
        <div class="hora hora8"><span>8</span></div>
        <div class="hora hora9"><span>9</span></div>
        <div class="hora hora10"><span>10</span></div>
        <div class="hora hora11"><span>11</span></div>
        <div class="hora hora12"><span>12</span></div>
        <div class="manecilla horah" id="hora"></div>
        <div class="manecilla minuto" id="minuto"></div>
        <div class="manecilla segundo" id="segundo"></div>
        <div class="centro"></div>
    </div>

</body>
</html>
